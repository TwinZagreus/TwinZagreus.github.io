<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Animated flowing Z icon on gray circle cutout</title>
  <desc id="desc">A warm ivory circle with the transparent Z container cut out, a rotated clean coral-red layer behind it, and black liquid flowing through the center.</desc>
  <style>
    .liquid {
      stroke-dasharray: 50 50;
      stroke-dashoffset: 0;
      animation: liquid-flow 2.2s linear infinite;
      will-change: stroke-dashoffset;
    }

    @keyframes liquid-flow {
      to {
        stroke-dashoffset: -100;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .liquid {
        animation: none;
      }
    }
  </style>
  <defs>
    <path id="z-container" d="M1.084 0.5H501.084L183.378 501.5H403.084L501.084 601.5H1.084L318.790 100.5H101.584L1.084 0.5Z" />
    <clipPath id="z-clip">
      <use href="#z-container" />
    </clipPath>
    <mask id="background-cutout" maskUnits="userSpaceOnUse" x="0" y="0" width="800" height="800">
      <circle cx="400" cy="400" r="400" fill="#FFFFFF" />
      <use href="#z-container" transform="translate(147.903 99)" fill="#000000" />
    </mask>
    <mask id="red-shadow-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="800" height="800">
      <rect width="800" height="800" fill="#FFFFFF" />
      <use href="#z-container" transform="translate(147.903 99)" fill="#000000" />
    </mask>
  </defs>

  <circle cx="400" cy="400" r="400" fill="#F2EFE7" mask="url(#background-cutout)" />

  <g mask="url(#red-shadow-mask)">
    <g transform="translate(147.903 99)">
      <g transform="rotate(90 252.097 301)" clip-path="url(#z-clip)">
        <path
          class="liquid"
          d="M51.084 50.5H409.937L92.231 551.5H452.084"
          pathLength="100"
          fill="none"
          stroke="#F2555A"
          stroke-width="100"
          stroke-linecap="square"
          stroke-linejoin="miter"
          stroke-miterlimit="3"
          shape-rendering="geometricPrecision"
        />
      </g>
    </g>
  </g>

  <g transform="translate(147.903 99)" clip-path="url(#z-clip)">
    <path
      class="liquid"
      d="M51.084 50.5H409.937L92.231 551.5H452.084"
      pathLength="100"
      fill="none"
      stroke="#000000"
      stroke-width="100"
      stroke-linecap="square"
      stroke-linejoin="miter"
      stroke-miterlimit="3"
      shape-rendering="geometricPrecision"
    />
  </g>
</svg>
