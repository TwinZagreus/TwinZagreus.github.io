<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 504.194 602" role="img" aria-labelledby="title desc">
  <title id="title">Animated flowing Z icon transparent</title>
  <desc id="desc">A transparent-background Z container with black liquid flowing from the upper-left path to the lower-right path. The non-black area is transparent.</desc>
  <style>
    .liquid {
      stroke-dasharray: 50 50;
      stroke-dashoffset: 0;
      animation: liquid-flow 1.2s linear infinite;
      will-change: stroke-dashoffset;
    }

    @keyframes liquid-flow {
      to {
        stroke-dashoffset: -100;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .liquid {
        animation: none;
      }
    }
  </style>
  <defs>
    <path id="z-container" d="M1.084 0.5H501.084L183.378 501.5H403.084L501.084 601.5H1.084L318.790 100.5H101.584L1.084 0.5Z" />
    <clipPath id="z-clip">
      <use href="#z-container" />
    </clipPath>
  </defs>

  <g clip-path="url(#z-clip)">
    <path
      class="liquid"
      d="M51.084 50.5H409.937L92.231 551.5H452.084"
      pathLength="100"
      fill="none"
      stroke="#000000"
      stroke-width="100"
      stroke-linecap="square"
      stroke-linejoin="miter"
      stroke-miterlimit="3"
      shape-rendering="geometricPrecision"
    />
  </g>
</svg>
